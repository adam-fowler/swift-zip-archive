name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.swift"
      - "**.yml"
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Select appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: SPM tests
        run: swift test --enable-code-coverage
      - name: Convert coverage files
        run: |
          xcrun llvm-cov export -format "lcov" \
            .build/debug/swift-zip-archivePackageTests.xctest/Contents/MacOs/swift-zip-archivePackageTests \
            -ignore-filename-regex="\/Tests\/" \
            -instr-profile=.build/debug/codecov/default.profdata > info.lcov
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          file: info.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: ["swift:6.1", "swift:6.2", "swift:6.3"]

    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test
        run: |
          swift test --enable-code-coverage
      - name: Convert coverage files
        run: |
          llvm-cov export -format="lcov" \
            .build/debug/swift-zip-archivePackageTests.xctest \
            -ignore-filename-regex="\/Tests\/" \
            -instr-profile .build/debug/codecov/default.profdata > info.lcov
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          files: info.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.3-release
          tag: 6.3-RELEASE
      - name: Download zlib
        run: |
          curl -L -o zlib.zip https://www.zlib.net/zlib132.zip
          mkdir zlib-132
          tar -xf zlib.zip -C zlib-132 --strip-components=1
      - name: Build and install zlib
        run: |
          cd zlib-132
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release
          cmake --install . --prefix ../install
      - name: Checkout
        uses: actions/checkout@v6
      - name: Swift version
        run: |
          swift --version
      - name: Test
        run: |
          swift test -Xcc -I'C:/Program Files (x86)/zlib/include' -Xlinker -L'C:/Program Files (x86)/zlib/lib'
